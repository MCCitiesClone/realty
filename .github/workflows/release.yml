name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Bump patch version
        id: version
        run: |
          FILE="buildSrc/src/main/kotlin/realty-conventions.gradle.kts"
          CURRENT=$(grep -oP 'version\s*=\s*"\K[^"]+' "$FILE")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/version = \"${CURRENT}\"/version = \"${NEW}\"/" "$FILE"
          echo "Bumped ${CURRENT} -> ${NEW}"
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew shadowJar

      - name: Collect JARs
        run: |
          mkdir -p jars
          find . -path "*/build/libs/*.jar" -type f \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            ! -name "*-tests.jar" \
            ! -name "*-plain.jar" \
            -exec cp {} jars/ \;
          ls -l jars

      - name: Commit and tag version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add buildSrc/src/main/kotlin/realty-conventions.gradle.kts
          git commit -m "chore(release): ${{ steps.version.outputs.tag }} [skip ci]"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" jars/*.jar \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
